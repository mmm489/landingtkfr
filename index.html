<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="referrer" content="always">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="format-detection" content="telephone=no">
    <title>Seguridad y privacidad online</title>
    <link rel="icon" href="./static/img/favicon.png">
    <link href="./static/css/foundation.min.css" media="screen" rel="stylesheet">
    <link href="./static/css/styles.css" rel="stylesheet">
    <link href="./static/css/custom.css" rel="stylesheet">
    <link href="./static/css/landing-overrides.css" rel="stylesheet">
  </head>
  <body class="page_index" data-landing-page-name="security/privacy-landing">
    <div class="page">
      <div class="header">
        <div class="row">
          <div class="columns">
            <div id="logo" class="click">
              <img src="./static/img/shield-icon.svg" alt="">
              <span data-i18n="logo_label">Seguridad Online</span>
            </div>
            <div id="menu">
              <select name="lang_selector" id="lang_selector" aria-label="Language">
                <option value="en" data-i18n="language_en">English</option>
                <option value="es" data-i18n="language_es">Espanol</option>
                <option value="fr" data-i18n="language_fr">Francais</option>
                <option value="de" data-i18n="language_de">Deutsch</option>
                <option value="it" data-i18n="language_it">Italiano</option>
              </select>
            </div>
          </div>
          <div class="columns">
            <div class="genres-header show-for-medium-up">
              <span data-i18n="banner_txt"></span>
            </div>
          </div>
        </div>
      </div>

      <main>
        <div class="row main-content">
          <div class="columns small-12 medium-5 medium-offset-1 large-4 large-offset-1">
            <div class="DL-text show-for-small" data-i18n="mob_act"></div>
            <div class="DL-text show-for-medium-up" data-i18n="online_act"></div>
          </div>
          <div class="columns small-12 medium-5 large-6">
            <div class="DL-button">
              <a class="click main" href="#" data-track-element-click="button_continue">
                <span data-i18n="continue">Continuar</span>
              </a>
              <div class="DL-ready click">
                <img src="./static/img/DL-dot.svg" alt="">
                <span data-i18n="speed"></span>
              </div>
            </div>
          </div>
          <div class="columns genres show-for-small"><p></p></div>
        </div>

        <div class="USPs">
          <div class="row">
            <div class="columns small-6 medium-4">
              <div class="USP-icon"><img src="./static/img/secure.svg" alt=""></div>
              <div class="USP-title" data-i18n="sec_con"></div>
            </div>
            <div class="columns small-6 medium-4">
              <div class="USP-icon"><img src="./static/img/latest.svg" alt=""></div>
              <div class="USP-title" data-i18n="unt_storage"></div>
            </div>
            <div class="columns medium-4 hide-for-small">
              <div class="USP-icon"><img src="./static/img/everywhere.svg" alt=""></div>
              <div class="USP-title" data-i18n="availability"></div>
            </div>
          </div>
        </div>

        <div class="row dl-steps show-for-medium-up">
          <div class="columns medium-10 medium-offset-1 large-8 large-offset-2">
            <h4 data-i18n="steps"></h4>
            <div class="steps-wrapper">
              <div class="step"><span class="step-nr">1</span><span data-i18n="create_account"></span></div>
              <div class="step-splitter"></div>
              <div class="step"><span class="step-nr">2</span><span data-i18n="verify_account"></span></div>
              <div class="step-splitter"></div>
              <div class="step"><span class="step-nr">3</span><span data-i18n="get_access"></span></div>
            </div>
          </div>
        </div>

        <div class="row tagline">
          <div class="columns">
            <div class="DL-button get-started">
              <a class="click secondary" href="#" data-track-element-click="button_get_started" data-i18n="get_started"></a>
            </div>
            <div class="DL-ready">
              <img src="./static/img/DL-dot.svg" alt="">
              <span data-i18n="discover"></span>
            </div>
            <h2 data-i18n="global_access"></h2>
            <div class="features_list">
              <div class="feature">
                <img src="./static/img/starred.svg" alt="">
                <div><div class="feature_desc" data-i18n="get_started"></div></div>
                <img src="./static/img/starred.svg" alt="">
              </div>
              <div class="feature">
                <img src="./static/img/starred.svg" alt="">
                <div><div class="feature_desc" data-i18n="storage"></div></div>
                <img src="./static/img/starred.svg" alt="">
              </div>
              <div class="feature">
                <img src="./static/img/starred.svg" alt="">
                <div><div class="feature_desc" data-i18n="extra_speed"></div></div>
                <img src="./static/img/starred.svg" alt="">
              </div>
            </div>
          </div>
        </div>
      </main>

      <div class="row footer" style="padding-bottom:20px;">
        <div class="columns small-12">
          <span data-i18n="terms"></span>
          <div id="lpfootermenu"><div class="clear"></div></div>
        </div>
      </div>
    </div>

    <div id="pop" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="overlay" data-close-modal></div>
      <div class="formbox">
        <div class="row">
          <div class="columns small-12 medium-6 formbox-left">
            <div class="formbox-header">
              <div class="form-title1" data-i18n="get_access"></div>
              <h3 class="form-title2" data-i18n="modal_step"></h3>
            </div>
            <div class="steps">
              <div class="step active">
                <div class="nr"><span>1</span></div>
                <div class="text active" data-i18n="free_account"></div>
              </div>
              <div class="step">
                <div class="nr"><span>2</span></div>
                <div class="text" data-i18n="verify_account"></div>
              </div>
              <div class="step">
                <div class="nr"><span>3</span></div>
                <div class="text" data-i18n="get_access"></div>
              </div>
            </div>
          </div>
          <div class="columns small-12 medium-6 formbox-right">
            <button type="button" class="modal-close" data-close-modal aria-label="Close">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
                <path d="M6 6 18 18M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <h3 id="modal-title" class="show-for-medium-up" data-i18n="free_account"></h3>
            <div class="form-fields">
              <form method="get" action="https://lp.secureaddefender.com/offer/mraf46ps83vm8uel/" id="cc_form" novalidate>
                <div class="field mail">
                  <img src="./static/img/input-email.svg" class="input_img" alt="">
                  <input type="email" name="email" data-i18n-placeholder="email_input" value="" autocomplete="email" data-track-element-click="input_email">
                  <div class="error email-wrong" data-i18n="invalid_email"></div>
                </div>
                <button type="submit" class="btn-submit" data-track-element-click="button_submit" data-i18n="continue"></button>
              </form>
              <div class="footer" data-i18n="terms"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initLanding } from './static/js/landing.js';
      initLanding();
    </script>
  </body>
</html>
